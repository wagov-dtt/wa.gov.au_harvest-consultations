name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise
        uses: jdx/mise-action@5083f4689f0a89f2aee5ebee5afc38e3cc3f4cb5 # v2.1.11
        with:
          install: true
          cache: true

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Generate and package helm chart
        run: |
          just helm-generate
          # Set chart version from git tag (strip leading 'v')
          CHART_VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" deploy/helm/harvest-consultations/Chart.yaml
          helm package deploy/helm/harvest-consultations -d dist/
          echo "CHART_FILE=$(ls dist/*.tgz)" >> $GITHUB_ENV

      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
          helm push "${{ env.CHART_FILE }}" oci://ghcr.io/${{ github.repository_owner }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.2
        with:
          files: dist/*.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
