name: CI and Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wagov-dtt/harvest-consultations

permissions:
  contents: read
  packages: write

jobs:
  ci-release:
    runs-on: ubuntu-24.04
    steps:
      # actions/checkout@v6.0.2 (Node 24)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # jdx/mise-action@v4.0.1 (Node 24)
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151

      - name: Read project version
        id: version
        run: |
          version="$(cat VERSION)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            test "v${version}" = "${GITHUB_REF_NAME}"
          fi

      - name: Test
        run: just test

      - name: Chart render/lint
        run: just chart-test

      - name: Build image
        if: github.ref_type != 'tag'
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} .

      # docker/login-action@v4.1.0 (Node 24)
      - name: Login to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/setup-buildx-action@v4.0.0 (Node 24)
      - name: Set up Docker Buildx
        if: github.ref_type == 'tag'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      # docker/build-push-action@v7.1.0 (Node 24)
      - name: Publish image
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Package Helm chart
        if: github.ref_type == 'tag'
        run: |
          just helmify
          helm package dist/helm/harvest-consultations --destination dist/charts

      - name: Push Helm chart to GHCR OCI
        if: github.ref_type == 'tag'
        run: |
          helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.repository_owner }} \
            --password-stdin <<< '${{ secrets.GITHUB_TOKEN }}'
          helm push dist/charts/*.tgz oci://${{ env.REGISTRY }}/wagov-dtt/charts
