name: CI and Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wagov-dtt/harvest-consultations

permissions:
  contents: read
  packages: write

jobs:
  ci-release:
    runs-on: ubuntu-24.04
    steps:
      # actions/checkout@v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # jdx/mise-action@v2
      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac

      - name: Read project version
        id: version
        run: |
          version="$(sed -n 's/^appVersion: "\(.*\)"/\1/p' charts/harvest-consultations/Chart.yaml)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            test "v${version}" = "${GITHUB_REF_NAME}"
          fi

      - name: Test
        run: just test

      - name: Chart render/lint
        run: just chart-test

      - name: Check generated chart is committed
        run: git diff --exit-code charts/harvest-consultations

      - name: Build image
        if: github.ref_type != 'tag'
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} .

      # docker/login-action@v3
      - name: Login to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/setup-buildx-action@v3
      - name: Set up Docker Buildx
        if: github.ref_type == 'tag'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      # docker/build-push-action@v6
      - name: Publish image
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Package Helm chart
        if: github.ref_type == 'tag'
        run: helm package charts/harvest-consultations --destination dist/charts

      - name: Push Helm chart to GHCR OCI
        if: github.ref_type == 'tag'
        run: |
          helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.repository_owner }} \
            --password-stdin <<< '${{ secrets.GITHUB_TOKEN }}'
          helm push dist/charts/*.tgz oci://${{ env.REGISTRY }}/wagov-dtt/charts
