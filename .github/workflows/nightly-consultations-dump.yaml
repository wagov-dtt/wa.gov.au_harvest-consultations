name: Nightly consultations dump

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

env:
  PORTALS_JSON: ${{ secrets.PORTALS_JSON }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_TABLE: ${{ secrets.DB_TABLE }}
  DB_PORT: ${{ secrets.DB_PORT }}

jobs:
  dump:
    runs-on: ubuntu-24.04
    environment: nightly
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      # actions/checkout@v6.0.2 (Node 24)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # jdx/mise-action@v4.0.1 (Node 24)
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151

      - name: Build dump
        run: just ci-dump

      - name: Verify dump artifact
        run: just verify-dump

      # actions/upload-artifact@v7.0.1 (Node 24)
      - name: Upload SQL artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sql
          path: dist/sql.tar.gz
          if-no-files-found: error
          retention-days: 14
