name: Nightly CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 14 * * *'  # 10 PM AWST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Run e2e test
        run: just ci-test

      - name: Package helm chart
        if: always()
        run: just helm-package

      - name: Upload dump artifact
        if: always() && hashFiles('dist/consultations.sql.gz') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: consultations-dump
          path: dist/consultations.sql.gz
          retention-days: 7

      - name: Upload helm chart artifact
        if: always() && hashFiles('chart/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-chart
          path: chart/
          retention-days: 7

      - name: Upload helm package artifact
        if: always() && hashFiles('dist/*.tgz') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-package
          path: dist/*.tgz
          retention-days: 7
