name: Nightly CI

on:
  schedule:
    - cron: '0 14 * * *'  # 10 PM AWST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise
        uses: jdx/mise-action@5083f4689f0a89f2aee5ebee5afc38e3cc3f4cb5 # v2.1.11
        with:
          install: true
          cache: true

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Run e2e test
        run: just ci-test

      - name: Package helm chart
        if: always()
        run: just helm-package

      - name: Upload dump artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: consultations-dump
          path: dist/consultations.sql.gz
          retention-days: 7

      - name: Upload helm chart artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: helm-chart
          path: deploy/helm/harvest-consultations/
          retention-days: 7

      - name: Upload helm package artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: helm-package
          path: dist/*.tgz
          retention-days: 7
