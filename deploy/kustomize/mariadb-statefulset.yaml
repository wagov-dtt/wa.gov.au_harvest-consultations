apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  labels:
    app: mariadb
spec:
  serviceName: mariadb
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
        app.kubernetes.io/name: harvest-consultations
        app.kubernetes.io/instance: harvest
    spec:
      containers:
        - name: mariadb
          image: mariadb:11
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MARIADB_ROOT_PASSWORD
              value: harvest
            - name: MARIADB_DATABASE
              value: harvest
          readinessProbe:
            exec:
              command: ["mariadb-admin", "-uroot", "-pharvest", "-h", "127.0.0.1", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 30
