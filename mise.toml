[tools]
just = "1"
kind = "0.30"
kubectl = "1.36"
kustomize = "5"
helm = "4"
"github:arttor/helmify" = "v0.4"

[tasks.build]
description = "Build container image"
run = "docker build -t ${IMAGE:-harvest-consultations}:${TAG:-test} ."

[tasks.test]
description = "Lint PHP script"
run = "docker run --rm -v \"$PWD:/app\" -w /app php:8.4-cli-trixie php -l harvest.php"
