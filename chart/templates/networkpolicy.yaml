{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mariadb-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harvest-consultations.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: mariadb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: harvest-cronjob
      ports:
        - protocol: TCP
          port: 3306
{{- end }}
