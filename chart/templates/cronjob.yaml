apiVersion: batch/v1
kind: CronJob
metadata:
  name: harvest-cronjob
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harvest-consultations.labels" . | nindent 4 }}
    app: harvest-cronjob
spec:
  schedule: {{ .Values.harvest.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: harvest-cronjob
        spec:
          containers:
            - name: harvest
              image: "{{ .Values.harvest.image.repository }}:{{ include "harvest-consultations.harvestImageTag" . }}"
              imagePullPolicy: IfNotPresent
              command: ["duckdb", "-c", ".read /etc/config/harvest.sql"]
              resources:
                {{- toYaml .Values.harvest.resources | nindent 16 }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              env:
                - name: MYSQL_HOST
                  value: {{ .Values.db.host | quote }}
                - name: MYSQL_USER
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: DB_USER
                - name: MYSQL_PWD
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: DB_PASSWORD
                - name: MYSQL_DATABASE
                  value: {{ .Values.db.database | quote }}
              volumeMounts:
                - name: config
                  mountPath: /etc/config
                  readOnly: true
          restartPolicy: Never
          volumes:
            - name: config
              configMap:
                name: harvest-config
