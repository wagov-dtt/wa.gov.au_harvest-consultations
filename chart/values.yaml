db:
  host: mariadb
  database: harvest
  table: consultations
  user: harvest
  password: harvest

mariadb:
  # Enable only for local/dev installs. For production, use an external database
  # and set db.host plus db.user/password.
  enabled: true
  # rootPassword is only used when the bundled MariaDB StatefulSet is enabled.
  rootPassword: harvest
  image:
    repository: mariadb
    tag: "11"
  storage:
    size: 1Gi
    # storageClassName: "encrypted"  # uncomment for encrypted at-rest storage
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1"

networkPolicy:
  enabled: false  # requires a CNI that enforces NetworkPolicy (e.g. Calico, Cilium)

harvest:
  schedule: "@hourly"
  image:
    repository: ghcr.io/wagov-dtt/harvest-duckdb
    tag: ""  # default: {chart-version}-duckdb{appVersion without dots}
    # digest: "sha256:..."  # pin to immutable digest for supply-chain assurance
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1"
